site_name: neural-avalanche-utac
site_description: "GenesisAeon Package 20 — Brain Criticality & Neuronal Avalanche Threshold"
site_author: Johann Römer / MOR Research Collective
repo_url: https://github.com/GenesisAeon/neural-avalanche-utac
repo_name: GenesisAeon/neural-avalanche-utac

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.annotate
    - content.code.copy
    - search.highlight

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Home: index.md
  - API Reference: api.md
  - Science: science.md
